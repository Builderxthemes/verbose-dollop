<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UltraRAM • AI Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .chat-bubble-user { background: #3b82f6; border-radius: 20px 20px 5px 20px; }
    .chat-bubble-ai { background: #1e2937; border-radius: 20px 20px 20px 5px; }
    .model-card { transition: all 0.3s ease; }
    .model-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="min-h-screen text-white font-sans">
  <div class="max-w-7xl mx-auto p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-cyan-500 rounded-2xl flex items-center justify-center text-3xl">
          ⚡
        </div>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">UltraRAM AI</h1>
          <p class="text-emerald-400 text-sm">All models • 8GB RAM Mode</p>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <div id="balance" class="flex items-center gap-2 bg-zinc-900 px-6 py-3 rounded-2xl">
          <i class="fas fa-coins text-yellow-400"></i>
          <span class="font-semibold" id="credit-amount">100</span>
          <span class="text-zinc-400 text-sm">credits</span>
        </div>
        <button onclick="claimDaily()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
          <i class="fas fa-gift"></i> Daily Reward
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <!-- Sidebar: Models -->
      <div class="lg:col-span-1">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <i class="fas fa-robot"></i> Models
        </h2>
        <div id="model-list" class="space-y-2 max-h-[75vh] overflow-y-auto pr-2"></div>
      </div>

      <!-- Chat Area -->
      <div class="lg:col-span-3 bg-zinc-950 rounded-3xl shadow-2xl flex flex-col h-[80vh]">
        <!-- Chat Header -->
        <div class="border-b border-zinc-800 p-5 flex items-center justify-between bg-zinc-900 rounded-t-3xl">
          <div class="flex items-center gap-3">
            <div id="current-model-badge" class="px-4 py-2 bg-zinc-800 rounded-2xl text-sm font-medium"></div>
          </div>
          <div class="text-xs text-zinc-500">Running locally • 8GB RAM</div>
        </div>

        <!-- Messages -->
        <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-6 bg-[url('https://www.transparenttextures.com/patterns/dark-mosaic.png')]"></div>

        <!-- Input -->
        <div class="p-6 border-t border-zinc-800 bg-zinc-900 rounded-b-3xl">
          <div class="flex gap-3">
            <input 
              id="prompt-input"
              type="text" 
              class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-cyan-500 rounded-2xl px-6 py-4 text-lg outline-none transition"
              placeholder="Ask anything... (25 credits per message)"
              onkeypress="if(event.key === 'Enter') sendMessage()"
            />
            <button onclick="sendMessage()" 
              class="bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-600 hover:to-emerald-600 px-10 rounded-2xl font-semibold text-lg transition">
              Send
            </button>
          </div>
          <div class="text-center text-xs text-zinc-500 mt-3">Cost: 25 credits • All models powered by NVIDIA API</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MODELS = {
      "deepseek-flash": { name: "DeepSeek V4 Flash", full: "deepseek-ai/deepseek-v4-flash" },
      "deepseek": { name: "DeepSeek V4 Pro", full: "deepseek-ai/deepseek-v4-pro" },
      "gemma4": { name: "Gemma 4 31B", full: "google/gemma-4-31b-it" },
      "qwen397": { name: "Qwen 3.5 397B", full: "qwen/qwen3.5-397b-a17b" },
      "qwen122": { name: "Qwen 3.5 122B", full: "qwen/qwen3.5-122b-a10b" },
      "mistral": { name: "Mistral Medium 3.5", full: "mistralai/mistral-medium-3.5-128b" },
      "mistral-small": { name: "Mistral Small 4", full: "mistralai/mistral-small-4-119b-2603" },
      "kimi": { name: "Kimi K2.6", full: "moonshotai/kimi-k2.6" },
      "glm": { name: "GLM 5.1", full: "z-ai/glm-5.1" },
      "step": { name: "Step 3.7 Flash", full: "stepfun-ai/step-3.7-flash" }
    };

    let currentModel = "deepseek-flash";
    let credits = 150;

    function updateBalance() {
      document.getElementById("credit-amount").textContent = credits;
    }

    function renderModels() {
      const container = document.getElementById("model-list");
      container.innerHTML = "";
      Object.keys(MODELS).forEach(key => {
        const m = MODELS[key];
        const isActive = key === currentModel;
        const div = document.createElement("div");
        div.className = `model-card p-4 rounded-2xl cursor-pointer ${isActive ? 'bg-emerald-600 text-white' : 'bg-zinc-900 hover:bg-zinc-800'}`;
        div.innerHTML = `
          <div class="font-semibold">${m.name}</div>
          <div class="text-xs text-zinc-400 mt-1">${m.full}</div>
        `;
        div.onclick = () => {
          currentModel = key;
          renderModels();
          document.getElementById("current-model-badge").innerHTML = 
            `${m.name} <span class="text-emerald-400 text-xs">(${key})</span>`;
        };
        container.appendChild(div);
      });
    }

    async function sendMessage() {
      const input = document.getElementById("prompt-input");
      const prompt = input.value.trim();
      if (!prompt) return;

      if (credits < 25) {
        alert("Not enough credits! Use Daily Reward.");
        return;
      }

      // Add user message
      addMessage("user", prompt);
      credits -= 25;
      updateBalance();
      input.value = "";

      const thinking = addMessage("ai", "Thinking...", true);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: currentModel, prompt })
        });

        const data = await res.json();

        // Remove thinking message
        thinking.remove();

        if (data.success) {
          addMessage("ai", data.response);
        } else {
          addMessage("ai", `Error: ${data.error}`);
        }
      } catch (err) {
        thinking.remove();
        addMessage("ai", "Failed to connect to API.");
      }
    }

    function addMessage(role, content, isTemp = false) {
      const container = document.getElementById("chat-messages");
      const msg = document.createElement("div");
      msg.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      msg.innerHTML = `
        <div class="${role === 'user' ? 'chat-bubble-user text-white' : 'chat-bubble-ai text-zinc-100'} max-w-[80%] px-6 py-4">
          ${content}
        </div>
      `;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      return msg;
    }

    function claimDaily() {
      credits += 1500;
      updateBalance();
      alert("✅ Daily reward claimed! +1500 credits");
    }

    // Initialize
    window.onload = () => {
      updateBalance();
      renderModels();
      document.getElementById("current-model-badge").innerHTML = 
        `${MODELS[currentModel].name} <span class="text-emerald-400 text-xs">(${currentModel})</span>`;
      
      // Welcome message
      setTimeout(() => {
        addMessage("ai", "Hello! I'm UltraRAM AI. Choose a model from the left and start chatting. All models run with 8GB RAM.");
      }, 800);
    };
  </script>
</body>
</html>
